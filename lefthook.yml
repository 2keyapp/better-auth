output:
  - success
  - failure

pre-commit:
  parallel: true
  commands:
    biome:
      run: pnpm biome check --write --error-on-warnings --no-errors-on-unmatched --files-ignore-unknown=true --colors=off {staged_files}
      stage_fixed: true
    spell:
      run: pnpm cspell --cache --no-progress --no-summary --no-must-find-files {staged_files}
    format:
      glob: "docs/**/*.{md,mdx}"
      root: "docs/"
      run: node_modules/.bin/remark {staged_files} --output --quiet
      stage_fixed: true
    lockfile:
      glob: "{package.json,pnpm-lock.yaml,pnpm-workspace.yaml,packages/*/package.json}"
      run: pnpm install --frozen-lockfile --ignore-scripts

pre-push:
  piped: true
  commands:
    typecheck:
      run: pnpm typecheck
    lint:
      run: pnpm lint
    format:
      run: pnpm format:check
    spell:
      run: pnpm lint:spell
    build:
      run: pnpm build
    lint-types:
      run: pnpm lint:types
    typecheck-dist:
      run: pnpm typecheck:dist
    lint-packages:
      run: pnpm lint:packages
    lint-dependencies:
      run: pnpm lint:dependencies
