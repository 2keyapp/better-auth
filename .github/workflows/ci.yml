name: CI

on:
  pull_request:
    types:
      - opened
      - synchronize
  push:
    branches:
      - main
      - next
  merge_group:

permissions: {}

env:
  TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
  TURBO_TEAM: ${{ vars.TURBO_TEAM || github.repository_owner }}
  BETTER_AUTH_TELEMETRY_ENDPOINT: ${{ vars.BETTER_AUTH_TELEMETRY_ENDPOINT }}

jobs:
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      js: ${{ steps.filter.outputs.js }}
      flutter: ${{ steps.filter.outputs.flutter }}
      docs: ${{ steps.filter.outputs.docs }}
      infra: ${{ steps.filter.outputs.infra }}
      # Full Node package CI (build/typecheck/test matrix)
      node_ci: ${{ steps.flags.outputs.node_ci }}
      # Any workflow work needed at all
      any: ${{ steps.flags.outputs.any }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
          persist-credentials: false

      - uses: dorny/paths-filter@de90cc6fb38fc0963ad72b210f1f284cd68cea36 # v3.0.2
        id: filter
        with:
          filters: |
            js:
              - 'packages/**'
              - '!packages/flutter/**'
              - 'test/**'
              - 'pnpm-lock.yaml'
              - 'pnpm-workspace.yaml'
              - 'package.json'
              - 'turbo.json'
              - 'tsconfig.json'
              - 'tsconfig.base.json'
              - 'tsconfig.dist-check.json'
              - 'biome.json'
              - 'vitest*.ts'
              - 'docker-compose.yml'
            flutter:
              - 'packages/flutter/**'
            docs:
              - 'docs/**'
            infra:
              - '.github/workflows/ci.yml'
              - '.github/workflows/e2e.yml'
              - '.github/workflows/demo.yml'
              - '.github/workflows/preview.yml'
              - '.github/actions/**'
              - 'lefthook.yml'
              - 'biome.json'
              - 'turbo.json'
              - 'pnpm-lock.yaml'
              - 'pnpm-workspace.yaml'
              - 'package.json'

      - id: flags
        env:
          EVENT_NAME: ${{ github.event_name }}
          JS: ${{ steps.filter.outputs.js }}
          FLUTTER: ${{ steps.filter.outputs.flutter }}
          DOCS: ${{ steps.filter.outputs.docs }}
          INFRA: ${{ steps.filter.outputs.infra }}
        run: |
          # Always run full Node CI on push / merge_group (branch protection safety net).
          if [ "$EVENT_NAME" != "pull_request" ] || [ "$JS" = "true" ] || [ "$INFRA" = "true" ]; then
            echo "node_ci=true" >> "$GITHUB_OUTPUT"
          else
            echo "node_ci=false" >> "$GITHUB_OUTPUT"
          fi
          if [ "$EVENT_NAME" != "pull_request" ] || [ "$JS" = "true" ] || [ "$FLUTTER" = "true" ] || [ "$DOCS" = "true" ] || [ "$INFRA" = "true" ]; then
            echo "any=true" >> "$GITHUB_OUTPUT"
          else
            echo "any=false" >> "$GITHUB_OUTPUT"
          fi

  lint:
    needs: changes
    if: needs.changes.outputs.any == 'true'
    runs-on: ${{ (github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == 'better-auth/better-auth' || github.event_name != 'pull_request' && github.repository == 'better-auth/better-auth') && 'starsling-ubuntu-24.04' || 'ubuntu-24.04' }}
    permissions:
      contents: read
    concurrency:
      group: ${{ github.workflow }}-lint-${{ github.event.pull_request.number || github.event.merge_group.head_ref || github.ref }}
      cancel-in-progress: ${{ github.event_name == 'pull_request' }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Cache turbo build setup
        if: needs.changes.outputs.node_ci == 'true'
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-turbo-

      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: '.nvmrc'
          registry-url: 'https://registry.npmjs.org'
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build
        if: needs.changes.outputs.node_ci == 'true'
        env:
          TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
          TURBO_TEAM: ${{ vars.TURBO_TEAM || github.repository_owner }}
        run: pnpm build

      - name: Lint
        env:
          TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
          TURBO_TEAM: ${{ vars.TURBO_TEAM || github.repository_owner }}
        run: pnpm lint

      - name: Lint Dependencies
        if: needs.changes.outputs.node_ci == 'true'
        env:
          TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
          TURBO_TEAM: ${{ vars.TURBO_TEAM || github.repository_owner }}
        run: pnpm lint:dependencies

      - name: Lint Packages
        if: needs.changes.outputs.node_ci == 'true'
        env:
          TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
          TURBO_TEAM: ${{ vars.TURBO_TEAM || github.repository_owner }}
        run: pnpm lint:packages

      - name: Lint Spell
        env:
          TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
          TURBO_TEAM: ${{ vars.TURBO_TEAM || github.repository_owner }}
        run: pnpm lint:spell

      - name: Lint Format
        run: pnpm format:check

      - name: Lint Types
        if: needs.changes.outputs.node_ci == 'true'
        env:
          TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
          TURBO_TEAM: ${{ vars.TURBO_TEAM || github.repository_owner }}
        run: pnpm lint:types

  typecheck:
    needs: changes
    if: needs.changes.outputs.node_ci == 'true'
    runs-on: ${{ (github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == 'better-auth/better-auth' || github.event_name != 'pull_request' && github.repository == 'better-auth/better-auth') && 'starsling-ubuntu-24.04' || 'ubuntu-24.04' }}
    permissions:
      contents: read
    concurrency:
      group: ${{ github.workflow }}-typecheck-${{ github.event.pull_request.number || github.event.merge_group.head_ref || github.ref }}
      cancel-in-progress: ${{ github.event_name == 'pull_request' }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Cache turbo build setup
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-turbo-

      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: '.nvmrc'
          registry-url: 'https://registry.npmjs.org'
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Typecheck
        run: pnpm typecheck

      - name: Typecheck dist declarations
        run: pnpm typecheck:dist

  test:
    needs: changes
    if: needs.changes.outputs.node_ci == 'true'
    runs-on: ${{ (github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == 'better-auth/better-auth' || github.event_name != 'pull_request' && github.repository == 'better-auth/better-auth') && 'starsling-ubuntu-24.04' || 'ubuntu-24.04' }}
    permissions:
      contents: read
    timeout-minutes: 30
    concurrency:
      group: ${{ github.workflow }}-test-${{ matrix.node-version }}-${{ github.event.pull_request.number || github.event.merge_group.head_ref || github.ref }}
      cancel-in-progress: ${{ github.event_name == 'pull_request' }}
    strategy:
      fail-fast: false
      matrix:
        node-version: [22.x, 24.x]
    env:
      COMPOSE_SERVICES: postgres postgres-kysely mongodb
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Cache turbo build setup
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-turbo-

      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ matrix.node-version }}
          registry-url: 'https://registry.npmjs.org'
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Rebuild native bindings for matrix node
        run: pnpm -r rebuild better-sqlite3

      - name: Reset Docker Containers
        run: docker compose down --volumes --remove-orphans

      - name: Start Docker Containers
        run: |
          read -r -a compose_services <<< "$COMPOSE_SERVICES"
          docker compose up -d --wait --wait-timeout 60 "${compose_services[@]}"

      - name: Test
        run: pnpm coverage

      - name: Docker Compose Diagnostics
        if: failure() && hashFiles('docker-compose.yml') != ''
        run: |
          read -r -a compose_services <<< "$COMPOSE_SERVICES"
          docker compose ps --all || true
          docker compose logs --no-color "${compose_services[@]}" || true

      - name: Stop Docker Containers
        if: always() && hashFiles('docker-compose.yml') != ''
        run: docker compose down --volumes --remove-orphans

  flutter:
    name: Flutter / Dart
    needs: changes
    if: needs.changes.outputs.flutter == 'true'
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    concurrency:
      group: ${{ github.workflow }}-flutter-${{ github.event.pull_request.number || github.event.merge_group.head_ref || github.ref }}
      cancel-in-progress: ${{ github.event_name == 'pull_request' }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - uses: dart-lang/setup-dart@e51d8e571e22473a2ddebf0ef8a2123f0ab2c02c # v1.7.1
        with:
          sdk: "3.5.0"

      - name: Resolve Dart dependencies
        working-directory: packages/flutter/dart
        run: dart pub get

      - name: Analyze Dart
        working-directory: packages/flutter/dart
        run: dart analyze --fatal-infos

      - name: Test Dart
        working-directory: packages/flutter/dart
        run: dart test

      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: '.nvmrc'
          registry-url: 'https://registry.npmjs.org'
          cache: pnpm

      - name: Install JS workspace (flutter server plugin tests)
        run: pnpm install --frozen-lockfile

      - name: Build flutter package dependencies
        run: pnpm --filter @better-auth/flutter... build

      - name: Test @better-auth/flutter
        run: pnpm --filter @better-auth/flutter exec vitest run

  ci:
    runs-on: ubuntu-latest
    needs: [changes, lint, typecheck, test, flutter]
    if: always()
    steps:
      - uses: re-actors/alls-green@05ac9388f0aebcb5727afa17fcccfecd6f8ec5fe # v1.2.2
        with:
          # Path filters intentionally skip unrelated heavy jobs.
          allowed-skips: changes, lint, typecheck, test, flutter
          jobs: ${{ toJSON(needs) }}
